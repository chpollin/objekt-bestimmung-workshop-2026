<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Objekt-Bestimmung — Workshop-Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__brand">
      <h1>Objekt-Bestimmung</h1>
      <p class="app-header__subtitle">Workshop-Demo · Landessammlungen Niederösterreich · Volkskundliche Sammlung</p>
    </div>
    <nav class="app-header__actions">
      <a href="knowledge/README.md">Über das Projekt</a>
    </nav>
  </header>

  <main class="app-main" id="app-main">
    <!-- ========== Gallery view (route: #/) ========== -->
    <div class="view view--gallery" id="view-gallery">
      <aside class="filter-sidebar" id="filter-sidebar">
        <div class="filter-block">
          <label class="filter-block__label" for="filter-query">Suche</label>
          <input
            type="search"
            id="filter-query"
            class="filter-block__input"
            placeholder="Name, Beschreibung, Material …"
            autocomplete="off"
          >
        </div>

        <div class="filter-block">
          <div class="filter-block__label">KI vs. Original</div>
          <label class="filter-checkbox">
            <input type="checkbox" id="filter-status-match" checked>
            <span class="status-dot status-dot--ok"></span> Übereinstimmung
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" id="filter-status-conflict" checked>
            <span class="status-dot status-dot--err"></span> Konflikt
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" id="filter-status-noai" checked>
            <span class="status-dot status-dot--mute"></span> keine KI
          </label>
        </div>

        <div class="filter-block">
          <div class="filter-block__label">Thesaurus</div>
          <div class="thesaurus-tree" id="thesaurus-tree">
            <p class="filter-sidebar__placeholder">Lade …</p>
          </div>
        </div>

        <div class="filter-block">
          <button type="button" id="btn-reset" class="filter-block__reset">Filter zurücksetzen</button>
        </div>
      </aside>

      <section class="gallery-section">
        <div class="gallery-section__header">
          <h2 id="gallery-stats">Lade …</h2>
        </div>
        <details class="dashboard" id="dashboard">
          <summary class="dashboard__summary">Akkuranz-Dashboard</summary>
          <div class="dashboard__body" id="dashboard-body">
            <!-- befüllt von renderDashboard() -->
          </div>
        </details>
        <div class="gallery" id="gallery" aria-busy="true">
          <!-- Objektkarten werden von app.js injiziert -->
        </div>
      </section>
    </div>

    <!-- ========== Detail view (route: #/object/:id) ========== -->
    <div class="view view--detail" id="view-detail" hidden>
      <!-- Inhalt wird von renderDetailView() injiziert -->
    </div>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
